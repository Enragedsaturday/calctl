name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Swift version
        run: swift --version
      - name: Core tests
        run: swift run calctl-tests
      - name: Build executable
        run: swift build --product calctl
      - name: CLI JSON contract tests
        run: scripts/test-cli-json.sh
      - name: Release build and privacy packaging check
        run: |
          scripts/build-release.sh
          scripts/verify-release.sh
